# AraStudy Project Configuration

project:
  name: "AraStudy-30M"
  seed: 42
  output_dir: "results/"
  phase: "phase3_fresh_start"

model:
  dim: 512
  n_layers: 6
  n_heads: 8
  vocab_size: 32000
  max_seq_len: 512
  dropout: 0.1
  positional_encoding: "learned"
  activation: "swiglu"
  normalization: "rmsnorm"
  weight_tying: true

data:
  split_dir: "data/splits/phase2b"
  tokenizer_dir: "results/tokenizers/phase2b"
  train_file: "data/splits/phase2b/train.txt"
  val_file: "data/splits/phase2b/valid.txt"
  test_file: "data/splits/phase2b/test.txt"
  generation_prompts: "generation_benchmark_prompts.md"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 3e-4
  min_lr: 3e-5
  weight_decay: 1e-1
  beta1: 0.9
  beta2: 0.95
  max_iters: 10000
  warmup_iters: 500
  eval_interval: 250
  save_interval: 1000
  early_stopping_patience: 5
  generation_interval: 2500
  log_interval: 10
  device: "cuda"
  dtype: "bfloat16"
  compile: true
  scheduler: "cosine_with_warmup"

curriculum:
  enabled: false
  stages:
    - name: "Easy"
      fraction: 0.3
      complexity_score_max: 0.3
    - name: "Medium"
      fraction: 0.4
      complexity_score_max: 0.7
    - name: "Hard"
      fraction: 0.3
      complexity_score_max: 1.0

wandb:
  enabled: false
  project: "AraStudy"
  entity: null # Your username

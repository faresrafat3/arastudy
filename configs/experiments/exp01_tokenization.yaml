experiment:
  name: "exp01_tokenization_comparison"
  description: "Systematic comparison of 6 tokenization strategies"

model:
  dim: 512
  n_layers: 6
  n_heads: 8
  max_seq_len: 512
  dropout: 0.1

training:
  steps: 10000
  eval_every: 250
  save_every: 1000
  batch_size: 16
  grad_accum_steps: 4
  learning_rate: 0.0003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 500
  early_stopping_patience: 5
  use_amp: true
  eval_max_batches: 80

generation:
  every_steps: 2500
  max_new_tokens: 200
  temperature: 0.8
  top_k: 50
  disallow_unk_token: true
  normalize_like_corpus: true
  prompt_file: "generation_benchmark_prompts.md"

paths:
  split_dir: "data/splits/phase2b"
  tokenizer_dir: "results/tokenizers/phase2b"
  output_dir: "results/exp01"
  log_dir: "results/logs/exp01"
  tokenization_config: "configs/experiments/exp01_phase2b_data.yaml"

tokenizers:
  - {id: bpe_32k, label: "BPE-32K"}
  - {id: bpe_16k, label: "BPE-16K"}
  - {id: bpe_8k, label: "BPE-8K"}
  - {id: morph_bpe_16k, label: "Morph-BPE-16K"}
  - {id: morph_bpe_8k, label: "Morph-BPE-8K"}
  - {id: char, label: "Char-Level"}

seeds: [42, 123, 2024]

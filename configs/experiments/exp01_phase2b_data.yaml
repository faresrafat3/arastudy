experiment:
  name: "exp01_phase2b_data"
  seed: 42

limits:
  max_articles: 300000
  max_disk_gb: 15
  min_free_disk_gb: 20

paths:
  raw_dir: "data/raw/phase2b"
  raw_glob: "data/raw/phase2b/wiki_raw_*.txt"
  cleaned_corpus: "data/processed/phase2b/cleaned.txt"
  split_dir: "data/splits/phase2b"
  tokenizer_dir: "results/tokenizers/phase2b"
  analysis_dir: "results/logs/phase2b"
  state_dir: "results/logs/phase2b/state"

source:
  hf_dataset: "wikimedia/wikipedia"
  hf_config: "20231101.ar"
  streaming: true
  shard_max_lines: 200000

cleaning:
  min_words: 20
  deduplicate: true
  keep_diacritics: false
  normalize_arabic: true

split:
  train_ratio: 0.90
  valid_ratio: 0.05
  test_ratio: 0.05

analysis:
  sample_sentences: 2000
  hidden_dim: 512

model:
  n_layers: 6
  hidden_dim: 512
  feedforward_dim: 2048

sentencepiece:
  input_sentence_size: 5000000
  shuffle_input_sentence: true
  train_extremely_large_corpus: true
  character_coverage: 1.0

tokenizers:
  - id: "bpe_32k"
    label: "BPE-32K"
    model_type: "bpe"
    vocab_size: 32000
    use_morph_segmentation: false
  - id: "bpe_16k"
    label: "BPE-16K"
    model_type: "bpe"
    vocab_size: 16000
    use_morph_segmentation: false
  - id: "bpe_8k"
    label: "BPE-8K"
    model_type: "bpe"
    vocab_size: 8000
    use_morph_segmentation: false
  - id: "morph_bpe_16k"
    label: "Morph-BPE-16K"
    model_type: "bpe"
    vocab_size: 16000
    use_morph_segmentation: true
  - id: "morph_bpe_8k"
    label: "Morph-BPE-8K"
    model_type: "bpe"
    vocab_size: 8000
    use_morph_segmentation: true
  - id: "char"
    label: "Char-Level"
    model_type: "char"
    vocab_size: 200
    use_morph_segmentation: false

# AraStudy Project Configuration

project:
  name: "AraStudy-30M"
  seed: 42
  output_dir: "results/"

model:
  dim: 512
  n_layers: 8
  n_heads: 8
  vocab_size: 32000
  max_seq_len: 512
  dropout: 0.1

data:
  tokenizer_path: "data/tokenizer/arastudy.model"
  train_data_path: "data/processed/train.bin"
  val_data_path: "data/processed/val.bin"
  dataset_name: "arastudy_curriculum"

training:
  batch_size: 32          # Adjusted for RTX 4050
  gradient_accumulation_steps: 4
  learning_rate: 6e-4
  min_lr: 6e-5
  weight_decay: 1e-1
  beta1: 0.9
  beta2: 0.95
  max_iters: 20000        # Depends on dataset size
  warmup_iters: 500
  eval_interval: 200
  log_interval: 10
  device: "cuda"
  dtype: "bfloat16"       # Use 'float16' if bfloat16 not supported
  compile: true           # PyTorch 2.0 compilation

curriculum:
  enabled: true
  stages:
    - name: "Easy"
      fraction: 0.3
      complexity_score_max: 0.3
    - name: "Medium"
      fraction: 0.4
      complexity_score_max: 0.7
    - name: "Hard"
      fraction: 0.3
      complexity_score_max: 1.0

wandb:
  enabled: true
  project: "AraStudy"
  entity: null # Your username
